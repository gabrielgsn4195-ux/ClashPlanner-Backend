name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      # Los tests usan SQLite en memoria (UseEnvironment("Testing")); no requieren SQL Server.
      - run: dotnet test ClashPlanner.Api.Tests/ClashPlanner.Api.Tests.csproj -c Release
