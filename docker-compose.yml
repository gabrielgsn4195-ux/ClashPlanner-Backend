# Despliegue/desarrollo local del backend ClashPlanner: API + PostgreSQL.
#
# Uso:
#   cd ClashPlanner-Backend
#   cp .env.example .env   # y rellena POSTGRES_PASSWORD y JWT_SIGNING_KEY
#   docker compose up -d --build
#
# La API queda en http://localhost:5117 (mapea el 8080 del contenedor). En
# producción NO se usa este Postgres: la BD es Neon (serverless), inyectada por
# la variable de entorno ConnectionStrings__DefaultConnection en Render.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clashplanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clashplanner"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: ./ClashPlanner.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # PostgreSQL del propio compose (red interna 'db'). En el contenedor no hace
      # falta SSL (red privada); en Neon la cadena lleva «SSL Mode=Require».
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=clashplanner;Username=postgres;Password=${POSTGRES_PASSWORD}"
      # Secreto de firma JWT (≥32 caracteres). NUNCA en el repo.
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: ClashPlanner
      Jwt__Audience: ClashPlanner
      # Origen permitido por CORS (dominio de la web). Por defecto, el dev server.
      Cors__Origins__0: ${WEB_ORIGIN:-http://localhost:5173}
      # Token ÚNICO de la API de CoC (el usuario final nunca lo ve) + proxy RoyaleAPI.
      Coc__Token: ${COC_API_TOKEN}
      Coc__UseProxy: ${COC_USE_PROXY:-true}
    ports:
      - "5117:8080"
    volumes:
      # Claves de Data Protection persistentes (para descifrar tokens tras reiniciar).
      - dp-keys:/keys
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  dp-keys:
