# Blueprint de Render para el backend de ClashPlanner (Docker, plan free).
# Render construye ClashPlanner.Api/Dockerfile desde el repo y expone el servicio.
# La BD es PostgreSQL en Neon (serverless, plan free). La cadena de conexión va en el
# secreto ConnectionStrings__DefaultConnection (formato Npgsql, con «SSL Mode=Require»);
# Neon permite conexiones desde cualquier IP, así que no hay firewall que abrir.
#
# Los dos secretos (ConnectionStrings__DefaultConnection y Jwt__SigningKey) van con
# `sync: false`: NO se versionan; se introducen en el panel de Render.
services:
  - type: web
    name: clashplanner-api
    runtime: docker
    branch: main
    region: frankfurt # la región EU más cercana
    plan: free
    rootDir: ClashPlanner.Api # contexto de build (donde está el .csproj)
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Migra en el ARRANQUE (cómodo con 1 instancia en Render free). Si se escala a ≥2
      # réplicas, mover las migraciones a un paso del despliegue para evitar una carrera
      # entre arranques simultáneos. Ver auditoría F-024.
      - key: Database__Migrate
        value: "true"
      - key: DataProtection__KeysPath
        value: /app/keys # /app es escribible (en free es efímero; se regenera)
      - key: Coc__UseProxy
        value: "true"
      - key: Jwt__Issuer
        value: ClashPlanner
      - key: Jwt__Audience
        value: ClashPlanner
      # CORS NO afecta al cliente Electron (autentica por cabecera Authorization, sin
      # Origin web sujeto a la política del navegador). Este valor solo importa cuando
      # exista un cliente WEB: poner ahí su dominio HTTPS real (NUNCA un http://). Hasta
      # entonces es un placeholder. Ver auditoría F-014.
      - key: Cors__Origins__0
        value: http://localhost:5173
      - key: Sync__MinClientVersion
        value: "0.1.9" # versión mínima de cliente aceptada en /sync (gate 426). Subir ante un cambio incompatible; nunca por encima de la última release. Clientes < 0.1.9 no mandan la cabecera → pasan (fail-open).
      - key: ConnectionStrings__DefaultConnection
        sync: false # secreto → se pone en el panel de Render
      - key: Jwt__SigningKey
        sync: false # secreto → se pone en el panel de Render
